<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Самая популярная библиотека для простых Web QR-сканеров -->
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #preview {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        .close-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 60px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .qr-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            pointer-events: none;
            z-index: 50;
        }

        .status-bar {
            position: absolute;
            bottom: 100px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            z-index: 10;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <video id="preview"></video>
    <div class="qr-guide"></div>
    <div class="status-bar" id="status">Запуск камеры...</div>
    <button class="close-btn" onclick="window.Telegram.WebApp.close()">Назад</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const statusBar = document.getElementById('status');

        // Инициализация сканера
        let scanner = new Instascan.Scanner({
            video: document.getElementById('preview'),
            mirror: false, // Не зеркалить заднюю камеру
            backgroundScan: false // Не сканировать, если вкладка свернута
        });

        // Слушатель успешного сканирования
        scanner.addListener('scan', function (content) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            tg.sendData(content);
            setTimeout(() => tg.close(), 150);
        });

        // Поиск доступных камер
        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) {
                // Ищем заднюю камеру (обычно последняя в списке или та, в имени которой есть 'back')
                let selectedCamera = cameras[0];
                for (let i = 0; i < cameras.length; i++) {
                    if (cameras[i].name.indexOf('back') !== -1) {
                        selectedCamera = cameras[i];
                        break;
                    }
                }

                // Если камер несколько и мы не нашли 'back', берем последнюю (обычно это основная)
                if (selectedCamera === cameras[0] && cameras.length > 1) {
                    selectedCamera = cameras[cameras.length - 1];
                }

                scanner.start(selectedCamera).then(() => {
                    statusBar.innerText = "Поиск QR-кода...";
                }).catch(e => {
                    statusBar.innerText = "Ошибка: " + e;
                });
            } else {
                statusBar.innerText = "Камеры не найдены";
            }
        }).catch(function (e) {
            statusBar.innerText = "Ошибка доступа: " + e;
            console.error(e);
        });
    </script>
</body>

</html>
