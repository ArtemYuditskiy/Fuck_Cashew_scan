<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем библиотеку сканера -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        /* Кастомизация внутренней рамки сканера */
        #reader__scan_region {
            background: rgba(0, 0, 0, 0.3);
        }

        #reader video {
            object-fit: cover !important;
        }

        .controls {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Анимация сканирующей линии */
        .scan-line {
            width: 80%;
            height: 2px;
            background: #248bfe;
            box-shadow: 0 0 15px #248bfe;
            position: absolute;
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% {
                top: 30%;
            }

            50% {
                top: 70%;
            }

            100% {
                top: 30%;
            }
        }
    </style>
</head>

<body>

    <div class="controls">
        <button class="close-btn" onclick="closeScanner()">Закрыть</button>
    </div>

    <div id="reader"></div>
    <div class="overlay">
        <div class="scan-line"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на всю высоту

        function closeScanner() {
            tg.close();
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Как только код найден:
            // 1. Вибрируем (тактильный отклик)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            // 2. Отправляем данные боту
            tg.sendData(decodedText);

            // 3. Закрываем Web App (происходит автоматически после sendData, но для страховки)
            setTimeout(() => {
                tg.close();
            }, 100);
        }

        function onScanFailure(error) {
            // Ошибки сканирования игнорируем, чтобы продолжать поиск
        }

        let html5QrcodeScanner = new Html5Qrcode("reader");

        // Настройки камеры
        const config = {
            fps: 15,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };

        // Запуск камеры (используем заднюю камеру 'environment')
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanFailure
        ).catch((err) => {
            console.error("Ошибка запуска камеры: ", err);
            alert("Не удалось включить камеру. Проверьте разрешения.");
        });
    </script>
</body>

</html>
