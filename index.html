<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #reader {
            width: 100vw !important;
            height: 100vh !important;
            border: none !important;
        }

        /* Убираем мусор библиотеки */
        #reader__dashboard,
        #reader__status_span,
        #reader img {
            display: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Кнопка снизу */
        .close-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 60px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .status-bar {
            position: absolute;
            bottom: 100px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            z-index: 10;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div id="reader"></div>
    <div class="status-bar" id="status">Поиск QR-кода...</div>
    <button class="close-btn" onclick="tg.close()">Назад</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const html5QrCode = new Html5Qrcode("reader");

        async function startScanner() {
            const screenWidth = window.innerWidth;
            // Оптимальный размер окна: 70% от ширины экрана
            const qrBoxSize = Math.floor(screenWidth * 0.7);

            // Конфигурация без жестких ограничений (для универсальности)
            const config = {
                fps: 20, // 20 FPS достаточно для QR и не перегревает слабые процессоры
                qrbox: { width: qrBoxSize, height: qrBoxSize },
                // Важно: на Android aspectRatio может вызывать черные полосы, если жестко задан
                aspectRatio: undefined,
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true // Родной API Google/Android
                }
            };

            try {
                // Стратегия №1: Пробуем запустить с базовыми настройками "задняя камера"
                // Это самый универсальный способ для 90% браузеров
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess
                );
            } catch (err) {
                console.warn("Базовый запуск не удался, пробуем перебор камер...", err);

                try {
                    // Стратегия №2: Если environment не сработал, перебираем устройства вручную
                    const devices = await Html5Qrcode.getCameras();
                    if (devices && devices.length > 0) {
                        // Берем последнюю камеру в списке (обычно это основная задняя)
                        const lastCameraId = devices[devices.length - 1].id;
                        await html5QrCode.start(lastCameraId, config, onScanSuccess);
                    } else {
                        throw new Error("Камеры не найдены");
                    }
                } catch (finalErr) {
                    document.getElementById('status').innerText = "Ошибка доступа: " + finalErr;
                }
            }
        }

        function onScanSuccess(decodedText) {
            // Базовая валидация: игнорируем пустые или слишком короткие строки
            if (!decodedText || decodedText.length < 3) return;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            // Передаем данные в бот
            tg.sendData(decodedText);

            // Небольшая задержка перед закрытием для визуального отклика
            setTimeout(() => tg.close(), 100);
        }

        // Запускаем
        startScanner();
    </script>
</body>

</html>
