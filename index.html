<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }

        #reader {
            width: 100% !important;
        }

        /* Прячем элементы управления библиотеки */
        #reader__dashboard,
        #reader__status_span,
        img {
            display: none !important;
        }

        /* Видео поток */
        #reader video {
            width: 100% !important;
            object-fit: cover !important;
        }

        /* Оверлей интерфейса */
        .ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .status {
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0.8;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        }

        .btn {
            pointer-events: auto;
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #555;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div id="reader"></div>
    <div class="ui-overlay">
        <div id="status" class="status">Инициализация...</div>
        <button class="btn" onclick="tg.close()">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const html5QrCode = new Html5Qrcode("reader");
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        function onScanSuccess(decodedText) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            html5QrCode.stop().then(() => {
                tg.sendData(decodedText);
                tg.close();
            }).catch(() => {
                tg.sendData(decodedText);
                tg.close();
            });
        }

        async function startScanner() {
            // Та самая функция, которая гарантирует квадратную рамку
            const qrboxFunction = function (viewfinderWidth, viewfinderHeight) {
                let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                let boxSize = Math.floor(minEdge * 0.7);
                return {
                    width: boxSize,
                    height: boxSize
                };
            }

            const config = {
                fps: isIOS ? 30 : 25,
                qrbox: qrboxFunction,
                aspectRatio: 1.0, // Оставляем 1.0 для корректной отрисовки холста
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: !isIOS
                }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess
                );
                document.getElementById('status').innerText = "Наведите на QR-код";
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Ошибка доступа к камере";
            }
        }

        startScanner();
    </script>
</body>

</html>
