<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Сброс всех отступов, чтобы занять 100% экрана */
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для сканера на весь экран */
        #reader {
            width: 100vw !important;
            height: 100vh !important;
            border: none !important;
        }

        /* Убираем лишние надписи библиотеки */
        #reader__dashboard,
        #reader__status_span {
            display: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            /* Видео заполнит весь экран без черных полос */
        }

        /* Кнопка закрытия */
        .close-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Статус-бар внизу */
        .status-bar {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 10;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <button class="close-btn" onclick="tg.close()">Закрыть</button>

    <div id="reader"></div>

    <div class="status-bar">Поиск QR-кода...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Настройка параметров сканера под экран телефона
        const screenWidth = window.innerWidth;
        const qrBoxSize = Math.floor(screenWidth * 0.7); // Рамка будет 70% от ширины экрана

        function onScanSuccess(decodedText) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            // Выводим alert для теста (потом уберем, когда подключим бота)
            // alert("Код найден: " + decodedText); 

            tg.sendData(decodedText);
            setTimeout(() => tg.close(), 150);
        }

        const html5QrCode = new Html5Qrcode("reader");

        const config = {
            fps: 20,
            qrbox: { width: qrBoxSize, height: qrBoxSize }, // Строго квадратная рамка
            aspectRatio: window.innerWidth / window.innerHeight // Подстройка под экран
        };

        html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess
        ).catch(err => {
            console.error(err);
            document.querySelector('.status-bar').innerText = "Ошибка камеры";
        });
    </script>
</body>

</html>
