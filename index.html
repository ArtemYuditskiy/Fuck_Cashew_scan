<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #reader {
            width: 100vw !important;
            height: 100vh !important;
            border: none !important;
        }

        /* Убираем мусор библиотеки */
        #reader__dashboard,
        #reader__status_span,
        #reader img {
            display: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Кнопка снизу */
        .close-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 60px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .status-bar {
            position: absolute;
            bottom: 100px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            z-index: 10;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div id="reader"></div>
    <div class="status-bar" id="status">Поиск QR-кода...</div>
    <button class="close-btn" onclick="tg.close()">Назад</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const screenWidth = window.innerWidth;
        const qrBoxSize = Math.floor(screenWidth * 0.7);

        function onScanSuccess(decodedText) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            tg.sendData(decodedText);
            setTimeout(() => tg.close(), 150);
        }

        const html5QrCode = new Html5Qrcode("reader");

        // Улучшенный конфиг для четкости
        const config = {
            fps: 30,
            qrbox: { width: qrBoxSize, height: qrBoxSize },
            aspectRatio: window.innerWidth / window.innerHeight,
            // Пытаемся заставить камеру дать HD разрешение
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 },
                focusMode: "continuous"
            }
        };

        html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess
        ).catch(err => {
            console.error(err);
            document.getElementById('status').innerText = "Ошибка: " + err;
        });
    </script>
</body>

</html>
