<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        #reader {
            width: 100vw !important;
            height: 100vh !important;
        }

        #reader__dashboard,
        #reader__status_span,
        img {
            display: none !important;
        }

        #reader video {
            object-fit: cover !important;
        }

        .ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .status {
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0.8;
        }

        .btn {
            pointer-events: auto;
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #555;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div id="reader"></div>
    <div class="ui-overlay">
        <div id="status" class="status">Инициализация...</div>
        <button class="btn" onclick="tg.close()">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const html5QrCode = new Html5Qrcode("reader");
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        function onScanSuccess(decodedText) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            html5QrCode.stop().then(() => {
                tg.sendData(decodedText);
                tg.close();
            }).catch(() => {
                tg.sendData(decodedText);
                tg.close();
            });
        }

        async function startScanner() {
            const screenWidth = window.innerWidth;
            const qrBoxSize = Math.floor(screenWidth * 0.7);

            // Прямые настройки для браузера
            const constraints = isIOS ? {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            } : {
                facingMode: "environment"
            };

            const config = {
                fps: isIOS ? 30 : 25,
                qrbox: { width: qrBoxSize, height: qrBoxSize },
                // На Android aspectRatio часто вызывает NotReadableError
                aspectRatio: isIOS ? (window.innerWidth / window.innerHeight) : undefined,
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: !isIOS
                }
            };

            try {
                await html5QrCode.start(
                    constraints,
                    config,
                    onScanSuccess
                );

                document.getElementById('status').innerText = "Поиск QR-кода...";
            } catch (err) {
                console.error("Ошибка:", err);
                document.getElementById('status').innerText = "Ошибка: доступ запрещен или камера занята";
            }
        }

        startScanner();
    </script>
</body>

</html>
